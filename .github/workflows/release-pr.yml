name: release pr
on:
  push:
    branches: main
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          skip-github-release: true
          skip-github-pull-request: true
          skip-labeling: true

      - name: test
        run: |
          echo "release_created: ${{ steps.release.outputs.release_created }}"
          echo "release_tag: ${{ steps.release.outputs.tag_name }}"
          echo "release_version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
          echo "paths_released: ${{ steps.release.outputs.paths_released }}"
